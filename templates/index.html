<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FedGT Malicious Client Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --input-bg: #334155;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { font-weight: 800; color: #818cf8; text-align: center; margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; color: #94a3b8; }
        input {
            background: var(--input-bg);
            border: 1px solid #475569;
            color: white;
            padding: 0.75rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.4); }
        button {
            grid-column: span 2;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            margin-top: 1rem;
        }
        button:hover { background: #4338ca; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .result {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 0.75rem;
            background: rgba(79, 70, 229, 0.1);
            border: 1px solid var(--primary);
            text-align: center;
        }
        .result h2 { color: #818cf8; margin: 0; font-size: 1.25rem; }
        .result span { font-size: 1.5rem; font-weight: 800; display: block; margin-top: 0.5rem; color: #f472b6; }
        .nav { margin-top: 2rem; }
        .nav a { color: #94a3b8; text-decoration: none; font-weight: 600; transition: color 0.2s; }
        .nav a:hover { color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Client Maliciousness Predictor</h1>
        <form action="/predict" method="POST" class="grid">
            <div class="input-group">
                <label>Packet Loss Rate</label>
                <input type="number" step="any" name="field_0" required placeholder="e.g. 10.5">
            </div>
            <div class="input-group">
                <label>Latency (ms)</label>
                <input type="number" step="any" name="field_1" required placeholder="e.g. 150">
            </div>
            <div class="input-group">
                <label>Upload Throughput</label>
                <input type="number" step="any" name="field_2" required placeholder="e.g. 25.0">
            </div>
            <div class="input-group">
                <label>Download Throughput</label>
                <input type="number" step="any" name="field_3" required placeholder="e.g. 100.0">
            </div>
            <div class="input-group">
                <label>CPU Usage (%)</label>
                <input type="number" step="any" name="field_4" required placeholder="e.g. 45.0">
            </div>
            <div class="input-group">
                <label>Memory Usage (%)</label>
                <input type="number" step="any" name="field_5" required placeholder="e.g. 60.0">
            </div>
            <button type="submit">Analyze Client</button>
        </form>

        {% if prediction %}
        <div class="result">
            <h2>Analysis Result</h2>
            <span>{{ prediction }}</span>
        </div>
        {% endif %}

        {% if error %}
        <div class="result" style="border-color: #ef4444; background: rgba(239, 68, 68, 0.1);">
            <h2 style="color: #f87171;">Error</h2>
            <span>{{ error }}</span>
        </div>
        {% endif %}
    </div>

    <div class="nav">
        <a href="/dashboard">View Dashboard →</a>
    </div>
</body>
</html>
