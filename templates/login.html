<!DOCTYPE html>
<html>
<head>
<title>FedGT Login</title>
<style>
body{
font-family:Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.login-box{
background:#1e293b;
padding:40px;
border-radius:10px;
width:300px;
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#4f46e5;
border:none;
color:white;
font-weight:bold;
border-radius:5px;
cursor:pointer;
}

.error{
color:red;
text-align:center;
}
</style>
</head>

<body>

<div class="login-box">

<h2>FedGT Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

</div>

</body>
</html>
